<!DOCTYPE html>
<html lang="{{index .T "lang_code"}}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{.Host}} — {{t .T "admin_panel"}}</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui,sans-serif;background:#1a1a2e;color:#e0e0e0;max-width:800px;margin:0 auto;padding:2em 1em;line-height:1.6}
        h1,h2,h3{color:#f0f0f0}h1{margin-bottom:.3em}h2{margin:1.5em 0 .5em}h3{margin:1em 0 .5em;font-size:1em}
        a{color:#7fdbca}
        table{width:100%;border-collapse:collapse;margin:.5em 0}
        th,td{text-align:left;padding:.4em .6em;border-bottom:1px solid #333}
        th{color:#aaa;font-size:.85em}
        label{display:block;margin:.5em 0 .2em;font-size:.9em;color:#aaa}
        input[type=text],input[type=password]{width:100%;padding:.5em;background:#16213e;border:1px solid #333;border-radius:4px;color:#e0e0e0;font-size:.95em}
        input:focus,textarea:focus{outline:none;border-color:#7fdbca}
        textarea{width:100%;padding:.5em;background:#16213e;border:1px solid #333;border-radius:4px;color:#e0e0e0;font-family:monospace;font-size:.9em}
        button{padding:.4em 1em;background:#7fdbca;color:#1a1a2e;border:none;border-radius:4px;cursor:pointer;font-weight:bold;font-size:.9em;margin:.5em .3em .5em 0}
        button:hover{opacity:.9}
        .delete-btn{background:#e74c3c;color:#fff}
        .delete-btn:hover{background:#c0392b}
        .script-card{border:1px solid #333;border-radius:6px;padding:1em;margin-bottom:1em}
        .script-path{font-family:monospace;font-weight:bold;color:#7fdbca}
        .key-text{font-family:monospace;font-size:.8em;word-break:break-all;color:#aaa}
        small{color:#666}
        hr{border:none;border-top:1px solid #333;margin:2em 0}
        .inline{display:inline}
        .top-bar{display:flex;justify-content:space-between;align-items:center}
        .lang{font-size:.85em}
    </style>
</head>
<body>
    <div class="top-bar">
        <div>
            <h1>{{.Host}} {{t .T "admin_panel"}}</h1>
        </div>
        <a class="lang" href="/lang?to={{index .T "lang_code"}}">{{t .T "lang_switch"}}</a>
    </div>

    {{range .Modules}}
    <hr>
    {{renderModule .}}
    {{end}}
</body>
</html>
