{{$keys := .Data}}
{{if $keys}}
<table>
    <thead>
        <tr><th>{{t .T "key_name"}}</th><th>{{t .T "key_content"}}</th><th>{{t .T "key_created"}}</th><th></th></tr>
    </thead>
    <tbody>
        {{range $keys}}
        <tr>
            <td><strong>{{.Name}}</strong></td>
            <td><span class="key-text">{{truncate .Key 60}}</span></td>
            <td><span class="badge">{{.CreatedAt.Format "2006-01-02"}}</span></td>
            <td>
                <form method="POST" action="/admin" class="inline" onsubmit="return confirm('{{t $.T "delete_key_confirm"}}')">
                    <input type="hidden" name="module" value="keys">
                    <input type="hidden" name="action" value="delete">
                    <input type="hidden" name="id" value="{{.ID}}">
                    <button type="submit" class="btn btn-danger btn-sm">{{t $.T "delete"}}</button>
                </form>
            </td>
        </tr>
        {{end}}
    </tbody>
</table>
{{else}}
<div class="empty">{{t .T "no_keys"}}</div>
{{end}}

<div class="add-form">
    <h3>{{t .T "add_key"}}</h3>
    <form method="POST" action="/admin">
        <input type="hidden" name="module" value="keys">
        <input type="hidden" name="action" value="add">
        <label>{{t .T "key_name"}}</label>
        <input type="text" name="name" placeholder="{{t .T "name_placeholder"}}" required>
        <label>{{t .T "key_content"}}</label>
        <textarea name="key" rows="3" placeholder="{{t .T "key_placeholder"}}" required></textarea>
        <div class="mt"><button type="submit" class="btn btn-primary">{{t .T "add_key"}}</button></div>
    </form>
</div>
