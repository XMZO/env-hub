{{$scripts := .Data.Scripts}}
{{$templates := .Data.Templates}}

{{if $scripts}}
{{range $scripts}}
<div class="card">
    <div class="card-header">
        <span class="card-title">{{.Path}}</span>
        <span class="card-desc">{{.Description}}</span>
        <span class="card-meta">{{.UpdatedAt.Format "01-02 15:04"}}</span>
        <span class="card-chevron">&#9654;</span>
    </div>
    <div class="card-body">
        <form id="save-script-{{.ID}}" method="POST" action="/admin">
            <input type="hidden" name="module" value="scripts">
            <input type="hidden" name="action" value="save">
            <input type="hidden" name="path" value="{{.Path}}">
            <label>{{t $.T "script_desc"}}</label>
            <input type="text" name="description" value="{{.Description}}" placeholder="{{t $.T "script_desc_placeholder"}}">
            <label>{{t $.T "script_content"}}</label>
            <textarea name="content" rows="14">{{.Content}}</textarea>
        </form>
        <form id="delete-script-{{.ID}}" method="POST" action="/admin" onsubmit="return confirm('{{t $.T "delete_script_confirm"}}')">
            <input type="hidden" name="module" value="scripts">
            <input type="hidden" name="action" value="delete">
            <input type="hidden" name="id" value="{{.ID}}">
        </form>
        <div class="card-actions">
            <button type="submit" form="delete-script-{{.ID}}" class="btn btn-danger">{{t $.T "delete"}}</button>
            <button type="submit" form="save-script-{{.ID}}" class="btn btn-primary">{{t $.T "save"}}</button>
        </div>
    </div>
</div>
{{end}}
{{else}}
<div class="empty">{{t .T "no_scripts"}}</div>
{{end}}

<div class="add-form">
    <h3>{{t .T "new_script"}}</h3>
    <form method="POST" action="/admin" id="new-script-form">
        <input type="hidden" name="module" value="scripts">
        <input type="hidden" name="action" value="new">

        {{if $templates}}
        <label>{{t .T "load_template"}}</label>
        <select id="template-select">
            <option value="">-- {{t .T "select_template"}} --</option>
            {{range $templates}}
            <option value="{{.ID}}">{{.Name}} &mdash; {{.Description}}</option>
            {{end}}
        </select>
        {{end}}

        <label>{{t .T "path"}}</label>
        <input type="text" name="path" id="new-path" placeholder="{{t .T "path_placeholder"}}" required>
        <label>{{t .T "script_desc"}}</label>
        <input type="text" name="description" id="new-description" placeholder="{{t .T "script_desc_placeholder"}}">
        <label>{{t .T "script_content"}}</label>
        <textarea name="content" id="new-content" rows="10" placeholder="#!/bin/sh&#10;set -eu&#10;..."></textarea>
        <div class="mt"><button type="submit" class="btn btn-primary">{{t .T "create"}}</button></div>
    </form>
</div>

{{if $templates}}
<script>
(function(){
    var data = {{toJSON $templates}};
    var map = {};
    for (var i = 0; i < data.length; i++) { map[data[i].ID] = data[i]; }
    var sel = document.getElementById('template-select');
    if (!sel) return;
    sel.addEventListener('change', function(){
        var t = map[sel.value];
        if (!t) return;
        document.getElementById('new-path').value = t.Path;
        document.getElementById('new-description').value = t.Description;
        document.getElementById('new-content').value = t.Content;
    });
})();
</script>
{{end}}
